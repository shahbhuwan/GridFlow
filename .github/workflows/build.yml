name: Build GridFlow CLI and GUI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-latest ]
        python-version: [ "3.11" ]  # Updated to 3.11

    steps:
    - name: Checkout code
      uses: actions/checkout@v5  # Updated to v5 (if available)

    - name: Set up Python
      uses: actions/setup-python@v5  # Check for v6 if available
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache Python dependencies
      uses: actions/cache@v4  # Updated to v4 (check for v5)
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgeos-dev libproj-dev libnetcdf-dev libgdal-dev gdal-bin

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install gdal netcdf proj  # Added proj

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==6.6.0  # Pin PyInstaller version (check latest version)
        pip install fiona
        pip install -r requirements.txt

    - name: Build executable
      run: |
        pyinstaller gridflow.spec
      env:
        PYTHONPATH: ./gridflow  # More explicit path

    - name: Test executable
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            ./dist/gridflow-windows.exe --help
            ;;
          macos-latest)
            ./dist/gridflow-macos --help
            ;;
          ubuntu-latest)
            ./dist/gridflow-linux --help
            ;;
        esac

    - name: Rename executable
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            mv dist/gridflow.exe dist/gridflow-windows.exe
            ;;
          macos-latest)
            mv dist/gridflow dist/gridflow-macos
            ;;
          ubuntu-latest)
            mv dist/gridflow dist/gridflow-linux
            ;;
        esac

    - name: Upload artifacts
      uses: actions/upload-artifact@v4  # Check for v5
      with:
        name: gridflow-executables-${{ matrix.os }}
        path: |
          dist/gridflow-*

    - name: Attach to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2  # Check for a newer version
      with:
        files: |
          dist/gridflow-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}